name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd functions && npm install

      - name: Build TypeScript
        run: cd functions && npm run build

      - name: Log environment versions
        run: |
          node -v
          cd functions && npm ls firebase-functions firebase-admin --depth=0
          npx firebase-tools@12.9.1 --version

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Create clean firebase.json (no extensions)
        run: |
          cat > firebase.json << 'EOF'
          {
            "functions": {
              "source": "functions"
            },
            "firestore": {
              "rules": "firestore.rules"
            }
          }
          EOF

      - name: Deploy Functions
        run: npx firebase-tools@12.9.1 deploy --only functions --project rokazap --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
